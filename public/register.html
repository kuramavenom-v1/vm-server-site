<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء هوية</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="grid"></div>

<div class="center-container">

<!-- ========== REGISTER ========== -->
<div class="card" id="registerBox">

    <h1>إنشاء هوية</h1>

    <input id="name" placeholder="الاسم">
    <input id="age" placeholder="العمر">

    <!-- المدينة (ثابتة) -->
    <select id="city">
        <option value="">اختر المدينة</option>
        <option value="Los Santos">Los Santos</option>
        <option value="Blaine County">Blaine County</option>
        <option value="Paleto Bay">Paleto Bay</option>
    </select>

    <input id="psn" placeholder="PSN">

    <button onclick="createIdentity()">إنشاء الهوية</button>

</div>


<!-- ========== DASHBOARD بعد الإنشاء ========== -->
<div class="card hidden" id="dashboardBox">

    <h1>تم إنشاء الهوية</h1>

    <p id="outName"></p>
    <p id="outId"></p>
    <p id="outCity"></p>
    <p id="outPSN"></p>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
