<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قوانين السيرفر</title>

<style>

/* =========================
   BASE
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#05070d;
  color:#e6f1ff;
  padding:20px;
  line-height:1.7;
}

/* =========================
   CONTAINER
========================= */
.container{
  max-width:850px;
  margin:auto;
}

/* =========================
   HEADER
========================= */
header{
  text-align:center;
  padding:22px;
  margin-bottom:20px;

  background:linear-gradient(145deg,#0b1220,#070a12);
  border:1px solid rgba(0,140,255,0.25);
  border-radius:14px;

  box-shadow:0 0 18px rgba(0,140,255,0.15);
}

header h1{
  color:#4db5ff;
  font-size:1.6rem;
  text-shadow:0 0 10px rgba(0,140,255,0.6);
}

header p{
  color:#a9c7e6;
  font-size:0.9rem;
}

/* =========================
   SECTION TITLE
========================= */
.section-title{
  margin:22px 0 10px;
  padding-right:10px;
  border-right:3px solid #4db5ff;
  color:#4db5ff;
  font-size:1.1rem;
}

/* =========================
   CARD
========================= */
.card{
  background:linear-gradient(145deg,#0a0f1a,#060912);
  border:1px solid rgba(0,140,255,0.15);
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
}

/* =========================
   LIST
========================= */
ul{
  list-style:none;
}

li{
  position:relative;
  padding:10px 10px 10px 25px;
  margin-bottom:8px;

  background:rgba(0,140,255,0.04);
  border:1px solid rgba(0,140,255,0.1);
  border-radius:10px;
}

li::before{
  content:"■";
  position:absolute;
  left:10px;
  top:12px;
  color:#4db5ff;
}

/* =========================
   BUTTONS AREA
========================= */
.actions{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* زر التأكيد */
.confirm-btn{
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(145deg,#0d6efd,#0a3d91);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 15px rgba(0,140,255,0.4);
}

/* زر الرجوع */
.back-btn{
  padding:12px;
  border-radius:10px;
  background:transparent;
  color:#cfe8ff;
  border:1px solid rgba(0,140,255,0.3);
  cursor:pointer;
}

/* =========================
   CHECK ICON (الصح المتحرك)
========================= */
.check-icon{
  display:inline-block;
  margin-right:10px;

  font-size:18px;
  color:#00ff99;

  opacity:0;
  transform:translateY(-15px) scale(0.5);

  text-shadow:0 0 10px #00ff99;
  transition:all 0.5s ease;
}

/* لما يظهر */
.check-icon.show{
  opacity:1;
  transform:translateY(0) scale(1.2);
  animation:pop 0.6s ease;
}

@keyframes pop{
  0%   { transform:translateY(-20px) scale(0.3); opacity:0; }
  60%  { transform:translateY(5px) scale(1.3); opacity:1; }
  100% { transform:translateY(0) scale(1.1); }
}

</style>

</head>

<body>

<div class="container">

<header>
  <h1>قوانين السيرفر</h1>
  <p>الرجاء الالتزام بالقوانين</p>
</header>

<!-- ===== القوانين (مختصر للحفاظ على المساحة) ===== -->
<h2 class="section-title">السرقات</h2>
<div class="card">
<ul>
<li>الحلاق 1-3</li>
<li>البقالة 2-5</li>
<li>الملابس 2-6</li>
<li>الأسلحة 4-6</li>
<li>البنك 6-10</li>
</ul>
</div>

<h2 class="section-title">القوانين العامة</h2>
<div class="card">
<ul>
<li>ممنوع القتل بدون سبب</li>
<li>ممنوع الطلق أثناء القيادة</li>
<li>ممنوع السب</li>
</ul>
</div>

<!-- ===== الأزرار ===== -->
<div class="actions">

  <button class="confirm-btn" onclick="confirmRules()">
    <span id="check" class="check-icon">✔</span>
    تم قراءة القوانين
  </button>

  <button class="back-btn" onclick="history.back()">
    رجوع
  </button>

</div>

</div>

<script>
function confirmRules(){
  const check = document.getElementById("check");

  check.classList.add("show");
}
</script>

</body>
</html>
