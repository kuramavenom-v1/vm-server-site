<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قوانين سيرفر VM</title>

<style>

/* =========================
   RESET + BASE
========================= */

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

body{
    background:#05070d;
    color:#e6f1ff;
    padding:20px;
    line-height:1.6;
}

/* =========================
   CONTAINER
========================= */

.container{
    width:100%;
    max-width:720px;
    margin:auto;
}

/* =========================
   HEADER (NEON DOC)
========================= */

header{
    text-align:center;
    padding:25px 15px;
    margin-bottom:25px;

    background:linear-gradient(145deg,#0b1220,#070a12);
    border:1px solid rgba(0,140,255,0.25);
    border-radius:14px;

    box-shadow:0 0 20px rgba(0,140,255,0.15);
}

header h1{
    font-size:1.6rem;
    color:#4db5ff;
    text-shadow:0 0 10px rgba(0,140,255,0.6);
}

header p{
    font-size:0.9rem;
    color:#a9c7e6;
}

/* =========================
   TITLES
========================= */

.section-title{
    margin:25px 0 12px;
    font-size:1.1rem;
    color:#4db5ff;
    border-right:3px solid #4db5ff;
    padding-right:10px;
}

/* =========================
   CARD SYSTEM
========================= */

.card{
    background:linear-gradient(145deg,#0a0f1a,#060912);
    border:1px solid rgba(0,140,255,0.15);
    border-radius:14px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 0 15px rgba(0,140,255,0.08);
}

/* =========================
   ALERT / INFO
========================= */

.alert-box,
.info-box{
    padding:12px;
    border-radius:10px;
    border:1px solid rgba(0,140,255,0.25);
    background:rgba(0,140,255,0.05);
    color:#cfe8ff;
}

/* =========================
   TABLE
========================= */

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d1b2a;
    color:#4db5ff;
    padding:10px;
    border:1px solid rgba(0,140,255,0.2);
}

td{
    padding:10px;
    border:1px solid rgba(0,140,255,0.15);
    color:#d7e9ff;
    font-size:13px;
}

/* =========================
   RULES LIST
========================= */

.rules-list{
    list-style:none;
}

.rules-list li{
    position:relative;
    padding:10px 10px 10px 25px;
    margin-bottom:6px;

    background:rgba(0,140,255,0.04);
    border:1px solid rgba(0,140,255,0.1);
    border-radius:10px;
}

.rules-list li::before{
    content:"■";
    position:absolute;
    left:10px;
    top:10px;
    color:#4db5ff;
}

/* =========================
   PUNISHMENT
========================= */

.punishment{
    color:#ff4d6d;
    font-weight:bold;
}

/* =========================
   BUTTON
========================= */

.flat-btn{
    width:100%;
    padding:12px;

    background:linear-gradient(145deg,#0d6efd,#0a3d91);
    color:#fff;

    border:none;
    border-radius:10px;

    font-weight:bold;
    cursor:pointer;

    box-shadow:0 0 15px rgba(0,140,255,0.4);
    transition:0.2s;
}

.flat-btn:hover{
    transform:scale(1.02);
    box-shadow:0 0 20px rgba(0,140,255,0.6);
}

</style>
</head>

<body>

<div class="container">

<header>
    <h1>سيرفر VM | القوانين الرسمية</h1>
    <p>الرجاء الالتزام التام بالقوانين لتجنب العقوبات</p>
</header>

<!-- باقي المحتوى نفسه بدون تغيير -->
