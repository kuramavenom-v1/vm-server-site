<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الهوية الوطنية</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="card.css">
</head>

<body>

<div class="center-container">

  <div class="id-card">

    <!-- HEADER -->
    <div class="id-header">
      <div>VM GOVERNMENT</div>
      <div>IDENTITY CARD</div>
    </div>

    <!-- BODY -->
    <div class="id-body">

      <img id="cardImage" class="id-img">

      <div class="id-info">
        <h2 id="cardName"></h2>

        <p>ID: <span id="cardId"></span></p>
        <p>Age: <span id="cardAge"></span></p>
        <p>City: <span id="cardCity"></span></p>
        <p>PSN: <span id="cardPSN"></span></p>

      </div>

    </div>

    <!-- FOOTER -->
    <div class="id-footer">
      <div class="status">🟢 ACTIVE CITIZEN</div>
    </div>

  </div>

</div>

<div class="actions">
  <button onclick="location.href='index.html'">خروج</button>
  <button onclick="location.href='rules.html'">القوانين</button>
  <button onclick="logout()">تسجيل خروج</button>
</div>

<script src="script.js"></script>
</body>
</html>
