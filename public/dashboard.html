<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>الهويه الوطنيه - VM</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="card.css">
</head>

<body>

<h1>الوطنيه الهوية</h1>

<div class="layout">

  <!-- 🪪 الهوية -->
  <div class="id-card">

    <div class="id-header">
      <div class="id-title">المملكة VM</div>
      <div class="id-sub">بطاقة مواطن</div>
    </div>

    <div class="id-body">

      <img id="cardImage" class="id-img">

      <div class="id-info">
        <h2 id="cardName"></h2>

        <p><span>رقم الهوية:</span> <span id="cardId"></span></p>
        <p><span>المدينة:</span> <span id="cardCity"></span></p>
        <p><span>PSN:</span> <span id="cardPSN"></span></p>

      </div>

    </div>

  </div>

  <!-- 📊 معلومات السيرفر -->
  <div class="server-box">

    <h2>السيرفر</h2>

    <div class="stat">
      👥 اللاعبين: <span id="playersCount">0</span>
    </div>

    <div class="stat">
      🟢 الحالة: Online
    </div>

    <div class="stat">
      📡 Ping: 32ms
    </div>

    <div class="stat">
      🏷️ اسم السيرفر: VM Server
    </div>

  </div>

</div>

<!-- 🔘 الأزرار -->
<div class="actions">

  <button onclick="location.href='index.html'">خروج</button>
  <button onclick="alert('قوانين السيرفر قريباً')">القوانين</button>
  <button onclick="alert('قائمة اللاعبين قريباً')">اللاعبين</button>

</div>

<script src="script.js"></script>
</body>
</html>
