<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>VM Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <!-- الهوية -->
  <div class="card">
    <h2 id="name"></h2>
    <p id="id"></p>
    <p id="city"></p>
  </div>

  <!-- إحصائيات -->
  <div class="card">
    <h3>📊 السيرفر</h3>
    <p>👥 عدد اللاعبين: <span id="count">...</span></p>
    <p>⭐ التقييم: 4.8</p>
    <p>🟢 Online</p>
  </div>

  <!-- قوانين -->
  <div class="card">
    <h3>📜 القوانين</h3>
    <p>احترام اللاعبين - ممنوع الغش - الالتزام بـ RP</p>
  </div>

  <!-- اللاعبين -->
  <div class="card">
    <h3>👥 اللاعبين</h3>
    <div id="players"></div>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("vm_user"));

document.getElementById("name").innerText = user.name;
document.getElementById("id").innerText = user.identity_number;
document.getElementById("city").innerText = user.city;

async function loadPlayers() {
  const res = await fetch("/api/users");
  const data = await res.json();

  document.getElementById("count").innerText = data.data.length;

  document.getElementById("players").innerHTML =
    data.data.map(p => `
      <div style="padding:8px;border-bottom:1px solid #333">
        <b>${p.name}</b> - ${p.city}<br>
        <small>${p.identity_number}</small>
      </div>
    `).join("");
}

loadPlayers();
</script>

</body>
</html>
